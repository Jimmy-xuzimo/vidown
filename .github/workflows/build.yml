name: build

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # 推送 tag 时创建 release
  actions: write   # 缓存与上传

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg
          echo "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Verify CLI
        run: |
          vidown --version
          vidown check

  build:
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit
          - os: ubuntu-latest
            arch: x64
            artifact_name: vidown-linux-x86_64
          - os: macos-13          # Intel
            arch: x64
            artifact_name: vidown-macos-x86_64
          - os: macos-latest      # Apple Silicon
            arch: arm64
            artifact_name: vidown-macos-arm64
          - os: windows-latest
            arch: x64
            artifact_name: vidown-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libfuse2

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install Windows build deps
        if: runner.os == 'Windows'
        run: choco install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Build (onefile)
        run: |
          python scripts/build.py --clean --no-upx --verify

      - name: Build (macOS .app)
        if: runner.os == 'macOS'
        run: python scripts/build.py --app

      - name: Build (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          # 下载 appimagetool
          curl -L -o /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool
          python scripts/build.py --appimage

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/vidown.exe dist/vidown.exe

      - name: Prepare release directory
        shell: bash
        run: |
          mkdir -p release
          # 单文件可执行
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/vidown.exe release/
          else
            cp dist/vidown release/
            chmod +x release/vidown
          fi
          # macOS .app
          if [ "$RUNNER_OS" == "macOS" ] && [ -d "app/Vidown.app" ]; then
            cp -R app/Vidown.app release/
          fi
          # Linux AppImage
          if [ "$RUNNER_OS" == "Linux" ] && ls dist/*.AppImage 1>/dev/null 2>&1; then
            cp dist/*.AppImage release/
            chmod +x release/*.AppImage
          fi
          # LICENSE
          cp LICENSE release/
          cp README.md release/
          # 校验和
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS
          else
            certutil -hashfile * SHA256SUMS 2>/dev/null || shasum -a 256 * > SHA256SUMS
          fi
          ls -lah

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -lah artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vidown-linux-x86_64/*
            artifacts/vidown-macos-x86_64/*
            artifacts/vidown-macos-arm64/*
            artifacts/vidown-windows-x86_64/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
