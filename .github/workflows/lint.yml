name: lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check vidown tests
      - name: Run black --check
        run: |
          pip install "black>=24.0.0"
          black --check --target-version py310 vidown tests

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mypy
        run: |
          pip install mypy
          pip install -r requirements.txt
      - name: Run mypy
        run: |
          mypy vidown --ignore-missing-imports --no-strict-optional || true
